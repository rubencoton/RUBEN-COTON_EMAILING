# Refactor 2026-04-25: PostgreSQL eliminado.
# Persistencia 100% local en /app/data/store.json + backup auto a Drive.
# Log rotation 7 días, max 50MB por archivo, anti-ENOSPC.
services:
  app:
    build: .
    container_name: emailing-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SHEETS_MIRROR=true
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  app-data:
