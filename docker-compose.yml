# Refactor 2026-04-25: PostgreSQL eliminado.
# Persistencia 100% local en /app/data/store.json + backup auto a Drive.
# Log rotation 7 días, max 50MB por archivo, anti-ENOSPC.
#
# BLINDAJE 2026-05-08:
# - mem_limit 1200m: previene que el contenedor se coma toda la RAM del VPS.
# - stop_grace_period 30s: da tiempo al gracefulShutdown a drenar el motor.
# - healthcheck con wget liviano (no spawn de Node nuevo cada 30s).
#
# ⚠️ ZERO-DOWNTIME EN COOLIFY: el bloque `deploy:` de compose v3 SOLO se
# aplica en Docker Swarm. Coolify usa docker compose normal, así que lo
# omitimos. Para zero-downtime hay que activar en la UI de Coolify:
#   Settings → Application → "Deployment Strategy: Rolling Update"
# (alternativa: "Run new before old stops"). Sin esto, hay ~10-30s de
# downtime entre stop del viejo y healthcheck OK del nuevo.
services:
  app:
    build: .
    container_name: emailing-app
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 1200m
    memswap_limit: 1200m
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SHEETS_MIRROR=true
    volumes:
      - app-data:/app/data
    healthcheck:
      # wget viene en alpine por defecto, no spawn proceso Node entero
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  app-data:
